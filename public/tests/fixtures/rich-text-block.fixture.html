<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RichTextBlock Fixture</title>

    <link rel="stylesheet" href="/interactive-surface.css" />

    <style>
      :root[data-theme="dark"] {
        --bg-primary: #1e293b;
        --bg-accent-gold: #d4af37;
        --bg-surface-muted: #1f2937;

        --text-on-primary: #ffffff;
        --text-on-accent: #111827;
        --text-primary: #e5e7eb;

        background-color: #0f172a;
      }

      :root[data-theme="light"] {
        --bg-primary: #2563eb;
        --bg-accent-gold: #facc15;
        --bg-surface-muted: #f1f5f9;

        --text-on-primary: #ffffff;
        --text-on-accent: #422006;
        --text-primary: #0f172a;

        background-color: #f8fafc;
      }

      body {
        padding: 4rem;
        font-family: system-ui, sans-serif;
      }

      .block {
        background: var(--bg-surface-muted);
        border-radius: 1rem;
        padding: 1.5rem;
        max-width: 720px;
      }

      .block-paragraph,
      .block-list,
      .block-quote,
      .code-block {
        margin-bottom: 1rem;
      }

      .inline-icon {
        display: inline-block;
        width: 1em;
        height: 1em;
        background: currentColor;
        border-radius: 0.25em;
        margin: 0 0.25em;
      }
    </style>
  </head>

  <body>
    <section id="rich-block" class="block">
      <p class="block-paragraph">
        <strong>Rich text</strong> with an
        <span class="inline-icon icon-star"></span>
        inline icon.
      </p>

      <ul class="block-list">
        <li>First item</li>
        <li>Second item</li>
      </ul>

      <blockquote class="block-quote">
        Design systems scale best when content is structured.
      </blockquote>

      <pre class="code-block">
      <code class="language-javascript">
const sum = (a, b) => a + b;
      </code>
    </pre>
    </section>
  </body>
</html>
