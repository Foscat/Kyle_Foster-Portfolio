<!doctype html>
<html lang="en" data-ui="retro-glass" data-theme="ocean-steel" data-mode="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta
      name="description"
      content="404 page for kyle-foster.com. The requested page could not be found."
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Kyle Foster Portfolio | 404 - Page Not Found</title>
    <!-- Theme-aware favicon hook targets this link element -->
    <link
      id="app-favicon"
      rel="icon"
      type="image/png"
      href="/favicons/favicon-ocean-steel-dark.png"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/interactive-surface-css@1.3.0/interactive-surface.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ui-style-kit-css@2.0.2/dist/ui-style-kit.with-bridge.min.css"
    />
    <style>
      /* ============================================================
         GLOBAL STYLES
         - Full-screen centered layout
         - Soft gradient background
         ============================================================ */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: rgb(var(--usk-text-rgb, 233 251 255));
        background:
          radial-gradient(circle at 18% 15%, rgb(var(--usk-accent-rgb, 83 240 255) / 0.2), transparent 32%),
          linear-gradient(135deg, rgb(var(--usk-bg-rgb, 6 22 29)), rgb(var(--usk-surface-soft-rgb, 8 29 38)));
        background-size: cover;
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
      }

      /* ============================================================
         FROSTED GLASS CONTAINER
         - Slight transparency
         - Strong blur
         - Rounded corners and soft border
         - Float animation for subtle movement
         ============================================================ */
      .glass-box {
        width: 90%;
        max-width: 480px;
        text-align: center;

        padding: 2.5rem;
        border-radius: 18px;
        background: rgb(var(--usk-surface-rgb, 13 37 48) / 0.86);
        -webkit-backdrop-filter: blur(18px);
        backdrop-filter: blur(18px);
        border: 1px solid rgb(var(--usk-border-rgb, 49 86 102) / 0.72);
        box-shadow: 0 18px 48px rgb(var(--usk-bg-rgb, 6 22 29) / 0.34);

        animation: float 6s ease-in-out infinite;
      }

      /* Subtle floating animation */
      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      /* ============================================================
         TEXT STYLES
         ============================================================ */

      .error-code {
        font-size: 130px;
        font-weight: 700;
        color: rgb(var(--usk-danger-rgb, 255 123 123));
        margin-bottom: 0.3rem;
        text-shadow: 0 4px 14px rgb(var(--usk-danger-rgb, 255 123 123) / 0.24);
      }

      h1 {
        margin: 0;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      p {
        margin: 1rem 0;
        font-size: 18px;
        line-height: 1.5;
        opacity: 0.9;
      }

      /* ============================================================
         LINK STYLES
         ============================================================ */
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 1rem;
        padding: 12px 22px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
      }

      /* ============================================================
         MOBILE RESPONSIVENESS
         ============================================================ */
      @media (max-width: 480px) {
        .error-code {
          font-size: 90px;
        }
        h1 {
          font-size: 24px;
        }
        p {
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body data-ui="retro-glass" data-theme="ocean-steel" data-mode="dark">
    <div class="glass-box">
      <div class="error-code">404</div>

      <h1>Page Not Found</h1>

      <p>
        The requested page is unavailable.<br />
        Use the link below to return to the portfolio.
      </p>

      <a class="interactive-surface" data-surface-variant="primary" data-surface-level="2" href="/">
        Return Home
      </a>
    </div>
  </body>
</html>
