services:
  - type: web
    name: kyle-foster-portfolio
    runtime: static
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_VERSION
        value: "10"
      - key: HUSKY
        value: "0"
      - key: CI
        value: "true"
      - key: VITE_SITE_URL
        value: "https://kyle-foster.com"
      - key: VITE_CONTACT_API_URL
        value: "https://email-microservice-grem.onrender.com/api/contact"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-store
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /codestream
        destination: /codestream/index.html
      - type: rewrite
        source: /sanderson-technology-enterprises
        destination: /sanderson-technology-enterprises/index.html
      - type: rewrite
        source: /side-projects
        destination: /side-projects/index.html
      - type: rewrite
        source: /hackathon
        destination: /hackathon/index.html
      - type: rewrite
        source: /smu
        destination: /smu/index.html
      - type: rewrite
        source: /contact
        destination: /contact/index.html
      - type: rewrite
        source: /docs
        destination: /docs/index.html
      - type: rewrite
        source: /health
        destination: /health/index.html
      # Keep the fallback last so known routes and immutable assets resolve first.
      - type: rewrite
        source: /*
        destination: /404.html
