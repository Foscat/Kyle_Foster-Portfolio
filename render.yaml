services:
  - type: web
    name: kyle-foster-portfolio
    runtime: static
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_VERSION
        value: "10"
      - key: HUSKY
        value: "0"
      - key: CI
        value: "true"
      - key: VITE_SITE_URL
        value: "https://kyle-foster.com"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
