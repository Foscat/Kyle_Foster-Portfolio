    <!-- Root where react app is rendered from -->
    <div id="root"></div>
    <script>
      (() => {
        const CHUNK_RELOAD_SESSION_KEY = "portfolio-chunk-reload-attempt";
        const CHUNK_RECOVERY_QUERY_PARAM = "chunk-recover";
        const MAX_RELOADS = 2;

        const safeReadReloadCount = () => {
          try {
            const raw = window.sessionStorage.getItem(CHUNK_RELOAD_SESSION_KEY);
            const parsed = Number.parseInt(raw ?? "0", 10);
            return Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
          } catch {
            return 0;
          }
        };

        const safeWriteReloadCount = (value) => {
          try {
            window.sessionStorage.setItem(CHUNK_RELOAD_SESSION_KEY, String(value));
          } catch {
            // Ignore storage failures (private mode / hardened browsers).
          }
        };

        const isAssetScriptUrl = (url) => /\/assets\/[^/]+\.js(?:\?.*)?$/i.test(String(url || ""));
        const isAssetStyleUrl = (url) => /\/assets\/[^/]+\.css(?:\?.*)?$/i.test(String(url || ""));

        const recoverFromMissingChunk = () => {
          const attempts = safeReadReloadCount();
          if (attempts >= MAX_RELOADS) return;
          safeWriteReloadCount(attempts + 1);

          try {
            const url = new URL(window.location.href);
            url.searchParams.set(CHUNK_RECOVERY_QUERY_PARAM, String(Date.now()));
            window.location.replace(url.toString());
            return;
          } catch {
            // Fall through to hard reload.
          }

          window.location.reload();
        };

        window.addEventListener(
          "error",
          (event) => {
            const target = event?.target;
            if (!target || target === window) return;

            const scriptSrc = typeof target.src === "string" ? target.src : "";
            const linkHref = typeof target.href === "string" ? target.href : "";
            const isRecoverableAsset =
              isAssetScriptUrl(scriptSrc) ||
              isAssetStyleUrl(linkHref) ||
              /Unable to preload CSS for\s+\/assets\//i.test(String(event?.message || ""));
            if (!isRecoverableAsset) return;

            recoverFromMissingChunk();
          },
          true
        );

        window.addEventListener("unhandledrejection", (event) => {
          const reasonMessage =
            event?.reason instanceof Error ? event.reason.message : String(event?.reason ?? "");
          if (!/Unable to preload CSS for\s+\/assets\//i.test(reasonMessage)) return;
          recoverFromMissingChunk();
        });
      })();
    </script>
